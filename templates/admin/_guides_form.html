<form class="flex h-full flex-col">
  <input type="hidden" name="id" value="{{ guide.id if guide else '' }}">

  <div class="space-y-5">
    <div>
      <label class="mb-2 block text-sm font-semibold text-slate-600">Property</label>
      <select
        name="property_id"
        required
        class="h-12 w-full rounded-2xl border border-slate-200 bg-white px-4 text-[15px] text-slate-900 focus:outline-none"
      >
        {% for p in properties %}
          <option value="{{ p.id }}" {% if guide and guide.property_id == p.id %}selected{% endif %}>
            {{ p.property_name }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="mb-2 block text-sm font-semibold text-slate-600">Title</label>
      <input
        name="title"
        required
        value="{{ guide.title if guide else '' }}"
        class="h-12 w-full rounded-2xl border border-slate-200 bg-white px-4 text-[15px] text-slate-900 focus:outline-none"
      >
    </div>

    <div>
      <label class="mb-2 block text-sm font-semibold text-slate-600">Category</label>
      <input
        name="category"
        value="{{ guide.category if guide else '' }}"
        class="h-12 w-full rounded-2xl border border-slate-200 bg-white px-4 text-[15px] text-slate-900 focus:outline-none"
      >
    </div>

    <div>
      <label class="mb-2 block text-sm font-semibold text-slate-600">Body</label>
      <textarea
        name="body_html"
        rows="12"
        class="min-h-[280px] w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-[15px] text-slate-900 focus:outline-none"
      >{{ guide.body_html if guide else '' }}</textarea>
    </div>

    <div class="flex items-center justify-between">
  <span class="text-[15px] font-medium text-slate-900">Active</span>

  <label class="relative inline-flex cursor-pointer items-center">
    <input
      type="checkbox"
      name="is_active"
      value="true"
      class="peer sr-only"
      {% if guide and guide.is_active %}checked{% endif %}
    >

    <div class="h-6 w-11 rounded-full bg-slate-200 transition peer-checked:bg-[#0F172A]"></div>

    <div class="absolute left-1 top-1 h-4 w-4 rounded-full bg-white transition-transform peer-checked:translate-x-5"></div>
  </label>
</div>
  </div>

  <div class="mt-6 flex items-center justify-end gap-3 border-t border-slate-100 pt-6">
    <button
      type="button"
      onclick="Guides.closeEditor()"
      class="inline-flex h-11 items-center rounded-2xl border border-slate-200 px-5 text-[15px] font-medium text-slate-800"
    >
      Cancel
    </button>

    <button
      type="submit"
      class="inline-flex h-11 items-center rounded-2xl bg-[#0F172A] px-5 text-[15px] font-semibold text-white"
    >
      Save Guide
    </button>
  </div>
</form>
