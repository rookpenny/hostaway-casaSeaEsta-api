<form class="flex h-full flex-col">
  <input type="hidden" name="id" value="{{ upgrade.id if upgrade else '' }}">
  <input
    type="hidden"
    name="image_url"
    value="{{ upgrade.image_url if upgrade else '' }}"
    data-upgrade-image-url
  />
  <input type="hidden" name="image_tmp_key" value="" data-upgrade-image-tmp-key />
  <input
    type="hidden"
    name="slug"
    value="{{ upgrade.slug if upgrade else '' }}"
    data-upgrade-slug
  />

  <div class="space-y-6">
    <div>
      <label class="mb-2 block text-sm font-semibold text-slate-600">Property</label>
      <select
        name="property_id"
        required
        class="h-12 w-full rounded-2xl border border-slate-200 bg-white px-4 text-[15px] text-slate-900 focus:outline-none"
      >
        {% for p in properties %}
          <option value="{{ p.id }}" {% if upgrade and upgrade.property_id == p.id %}selected{% endif %}>
            {{ p.property_name }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="mb-2 block text-sm font-semibold text-slate-600">Title</label>
      <input
        name="title"
        required
        value="{{ upgrade.title if upgrade else '' }}"
        class="h-12 w-full rounded-2xl border border-slate-200 bg-white px-4 text-[15px] text-slate-900 focus:outline-none"
      />
    </div>

    <div>
      <label class="mb-2 block text-sm font-semibold text-slate-600">Long description</label>
      <textarea
        name="long_description"
        rows="6"
        placeholder="Describe what this upgrade includes..."
        class="min-h-[160px] w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-[15px] text-slate-900 resize-none focus:outline-none"
      >{{ upgrade.long_description if upgrade and upgrade.long_description else '' }}</textarea>
      <div class="mt-2 text-[12px] text-slate-500">
        Shown in the upgrade details and guest-facing upsell UI.
      </div>
    </div>

    <div>
      <label class="mb-2 block text-sm font-semibold text-slate-600">Image</label>

      <div class="rounded-[24px] border border-slate-200 bg-slate-50 p-4">
        <div class="flex flex-wrap items-center gap-3">
          <label class="inline-flex h-11 cursor-pointer items-center rounded-2xl border border-slate-200 bg-white px-4 text-[15px] font-medium text-slate-800 hover:bg-slate-50">
            Choose image
            <input type="file" accept="image/*" class="hidden" data-upgrade-image-file />
          </label>

          <button
            type="button"
            class="inline-flex h-11 items-center rounded-2xl bg-[#0F172A] px-4 text-[15px] font-semibold text-white disabled:cursor-not-allowed disabled:opacity-50"
            data-upgrade-image-upload
          >
            Upload
          </button>

          <button
            type="button"
            class="inline-flex h-11 items-center rounded-2xl border border-slate-200 bg-white px-4 text-[15px] font-medium text-slate-700 hover:bg-slate-50"
            data-upgrade-image-clear
          >
            Remove
          </button>

          <div class="text-[12px] text-slate-500">
            PNG, JPG, or WebP recommended
          </div>
        </div>

        <img
          data-upgrade-image-preview
          src="{{ upgrade.image_url if (upgrade and upgrade.image_url) else '' }}"
          alt="Upgrade image"
          class="mt-4 w-full rounded-[20px] border border-slate-200 object-cover {% if not (upgrade and upgrade.image_url) %}hidden{% endif %}"
          style="max-height:220px;"
        />
      </div>

      <div class="mt-2 text-[12px] text-slate-500">
        Used in guest upsell cards and upgrade detail views.
      </div>
    </div>

    <div>
      <label class="mb-2 block text-sm font-semibold text-slate-600">Price (USD)</label>
      <input
        name="price_dollars"
        type="number"
        min="0"
        step="0.01"
        value="{{ '%.2f'|format((upgrade.price_cents or 0) / 100) if upgrade else '0.00' }}"
        class="h-12 w-full rounded-2xl border border-slate-200 bg-white px-4 text-[15px] text-slate-900 focus:outline-none"
      />
    </div>

    <div class="flex items-center justify-between rounded-[20px] border border-slate-200 bg-white px-4 py-4">
  <div>
    <div class="text-[15px] font-medium text-slate-900">Availability</div>
    <div class="mt-1 text-[12px] text-slate-500">
      Control whether guests can see and purchase this upgrade.
    </div>
  </div>

  <label class="inline-flex cursor-pointer items-center gap-3">
    <input
      type="checkbox"
      name="is_active"
      value="true"
      class="peer sr-only"
      {% if upgrade and upgrade.is_active %}checked{% endif %}
    />

    <span class="relative inline-block h-6 w-11">
      <span class="absolute inset-0 rounded-full bg-slate-200 transition-colors duration-200 peer-checked:bg-emerald-600"></span>
      <span class="absolute left-1 top-1 h-4 w-4 rounded-full bg-white transition-transform duration-200 peer-checked:translate-x-5"></span>
    </span>

    <span class="text-xs font-semibold text-slate-400 peer-checked:text-emerald-700">
      {% if upgrade and upgrade.is_active %}Active{% else %}Disabled{% endif %}
    </span>
  </label>
</div>
  </div>

  <div class="mt-8 flex items-center justify-end gap-3 border-t border-slate-100 pt-6">
    <button
      type="button"
      onclick="Upgrades.closeEditor()"
      class="inline-flex h-11 items-center rounded-2xl border border-slate-200 bg-white px-5 text-[15px] font-medium text-slate-700"
    >
      Cancel
    </button>

    <button
      type="submit"
      class="inline-flex h-11 items-center rounded-2xl bg-[#0F172A] px-5 text-[15px] font-semibold text-white"
    >
      Save Upgrade
    </button>
  </div>
</form>
